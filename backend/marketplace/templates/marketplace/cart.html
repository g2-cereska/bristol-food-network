{% extends 'marketplace/base.html' %}
{% load static %}

{% block title %}Your basket &middot; Bristol Food Network{% endblock %}

{% block content %}
<section class="cart-page">

  <header class="cart-header">
    <h1>Your basket</h1>
  </header>

  <div id="cart-guest-notice" class="cart-empty" hidden>
    <p>You need to be logged in as a customer to have a basket.</p>
    <a class="btn-primary" href="/market/login/">Log in</a>
  </div>

  <p id="cart-status" class="catalogue-status" role="status" aria-live="polite"></p>

  <div id="cart-list" class="cart-list"></div>

  <div id="cart-summary" class="cart-summary" hidden>
    <span>Total</span>
    <span id="cart-total-amount">&pound;0.00</span>
  </div>

  <section id="checkout-section" class="checkout-section" hidden>
    <h2>Checkout</h2>
    <form id="checkout-form" class="checkout-form" novalidate>
      <label for="delivery-address">Delivery address</label>
      <textarea
        id="delivery-address" rows="2"
        placeholder="Leave blank to use your saved address"
      ></textarea>

      <div id="producer-delivery-dates" class="producer-delivery-dates"></div>

      <label for="special-instructions">Delivery instructions (optional)</label>
      <textarea
        id="special-instructions" rows="2"
        placeholder="e.g. Deliver to the kitchen entrance, ask for the kitchen manager — useful for institutional or bulk orders"
      ></textarea>

      <p id="checkout-error" class="form-error" hidden></p>

      <button type="submit" class="btn-primary" id="checkout-submit">Place order</button>
    </form>
  </section>

</section>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const isCustomer = document.body.dataset.isCustomer === 'true';
    const customerId = document.body.dataset.customerId;

    const guestNotice = document.getElementById('cart-guest-notice');
    const statusEl = document.getElementById('cart-status');
    const listEl = document.getElementById('cart-list');
    const summaryEl = document.getElementById('cart-summary');
    const totalAmountEl = document.getElementById('cart-total-amount');
    const checkoutSection = document.getElementById('checkout-section');
    const checkoutForm = document.getElementById('checkout-form');
    const deliveryDatesContainer = document.getElementById('producer-delivery-dates');
    const checkoutError = document.getElementById('checkout-error');
    const checkoutSubmit = document.getElementById('checkout-submit');

    if (!isCustomer || !customerId) {
      guestNotice.hidden = false;
      return;
    }

    function formatPrice(value) {
      const n = Number(value);
      return Number.isFinite(n) ? `£${n.toFixed(2)}` : escapeHtml(value);
    }

    // Earliest selectable date for a given producer's lead time, used as
    // the date input's min — e.g. 48 hours' notice means "today + 2 days".
    function minDateForLeadTime(hours) {
      const leadDays = Math.ceil((Number(hours) || 0) / 24);
      const date = new Date();
      date.setDate(date.getDate() + leadDays);
      return date.toISOString().slice(0, 10);
    }

    function groupItemsByProducer(items) {
      const groups = new Map();
      for (const item of items) {
        const producerId = item.product.producer;
        if (!groups.has(producerId)) {
          groups.set(producerId, {
            producerId,
            producerName: item.product.producer_name,
            leadTimeHours: item.product.producer_lead_time_hours,
            items: [],
            subtotal: 0,
          });
        }
        const group = groups.get(producerId);
        group.items.push(item);
        group.subtotal += Number(item.line_total);
      }
      return Array.from(groups.values());
    }

    function cartItemRowHtml(item) {
      return `
        <article class="cart-item" data-item-id="${item.id}">
          <div class="cart-item-info">
            <h3>${escapeHtml(item.product.name)}</h3>
            <p class="cart-item-meta">${formatPrice(item.product.current_price)} / ${escapeHtml(item.product.unit)}</p>
          </div>
          <div class="cart-item-controls">
            <input
              type="number" min="1" max="${item.product.stock_quantity}" value="${item.quantity}"
              class="qty-input cart-qty-input" data-item-id="${item.id}"
              data-stock="${item.product.stock_quantity}"
              aria-label="Quantity for ${escapeHtml(item.product.name)}"
            >
            <span class="cart-line-total">${formatPrice(item.line_total)}</span>
            <button type="button" class="btn-link remove-btn" data-item-id="${item.id}">Remove</button>
          </div>
          <p class="cart-item-feedback" data-feedback-for="${item.id}" hidden></p>
        </article>
      `;
    }

    function producerGroupHtml(group) {
      return `
        <section class="cart-producer-group">
          <h2 class="cart-producer-name">${escapeHtml(group.producerName)}</h2>
          <p class="cart-producer-lead">Needs at least ${group.leadTimeHours} hours&rsquo; notice before delivery</p>
          ${group.items.map(cartItemRowHtml).join('')}
          <p class="cart-producer-subtotal">Subtotal: ${formatPrice(group.subtotal)}</p>
        </section>
      `;
    }

    function captureDeliveryDates() {
      const values = {};
      deliveryDatesContainer.querySelectorAll('.delivery-date-input').forEach((input) => {
        if (input.value) values[input.dataset.producerId] = input.value;
      });
      return values;
    }

    function renderDeliveryDateInputs(groups, preservedDates) {
      deliveryDatesContainer.innerHTML = groups.map((group) => {
        const minDate = minDateForLeadTime(group.leadTimeHours);
        const preserved = preservedDates[group.producerId] || '';
        return `
          <div class="delivery-date-row" data-producer-id="${group.producerId}">
            <label for="delivery-date-${group.producerId}">
              ${escapeHtml(group.producerName)} delivery date
              <span class="lead-time-note">(min. ${group.leadTimeHours}h notice)</span>
            </label>
            <input
              type="date" id="delivery-date-${group.producerId}"
              class="delivery-date-input" data-producer-id="${group.producerId}"
              min="${minDate}" value="${preserved}" required
            >
          </div>
        `;
      }).join('');
    }

    function renderCart(cart) {
      if (!cart.items.length) {
        listEl.innerHTML = '';
        summaryEl.hidden = true;
        checkoutSection.hidden = true;
        statusEl.textContent = 'Your basket is empty.';
        return;
      }

      const preservedDates = captureDeliveryDates();
      statusEl.textContent = '';
      const groups = groupItemsByProducer(cart.items);
      listEl.innerHTML = groups.map(producerGroupHtml).join('');
      summaryEl.hidden = false;
      totalAmountEl.textContent = formatPrice(cart.total);
      checkoutSection.hidden = false;
      renderDeliveryDateInputs(groups, preservedDates);
    }

    async function loadCart() {
      statusEl.textContent = 'Loading your basket…';
      try {
        const res = await fetch(`/api/cart/${customerId}/`, { credentials: 'same-origin' });
        if (!res.ok) throw new Error('Request failed');
        renderCart(await res.json());
      } catch (err) {
        statusEl.textContent = 'Could not load your basket right now. Please try again.';
        console.error(err);
      }
    }

    listEl.addEventListener('change', async (event) => {
      const input = event.target.closest('.cart-qty-input');
      if (!input) return;

      const itemId = input.dataset.itemId;
      const feedback = listEl.querySelector(`.cart-item-feedback[data-feedback-for="${itemId}"]`);
      const stock = parseInt(input.dataset.stock, 10);
      let quantity = Math.max(1, parseInt(input.value, 10) || 1);

      if (Number.isFinite(stock) && quantity > stock) {
        quantity = stock;
        feedback.textContent = `Only ${stock} in stock — quantity reduced.`;
        feedback.hidden = false;
      } else {
        feedback.hidden = true;
      }
      input.value = quantity;

      try {
        const res = await apiFetch(`/api/cart/items/${itemId}/`, {
          method: 'PATCH',
          body: JSON.stringify({ quantity }),
        });
        const data = await res.json().catch(() => null);
        if (res.ok) {
          renderCart(data);
        } else {
          feedback.textContent = extractErrorMessage(data, 'Could not update quantity.');
          feedback.hidden = false;
        }
      } catch (err) {
        feedback.textContent = 'Network error — please try again.';
        feedback.hidden = false;
      }
    });

    listEl.addEventListener('click', async (event) => {
      const btn = event.target.closest('.remove-btn');
      if (!btn) return;

      const itemId = btn.dataset.itemId;
      btn.disabled = true;

      try {
        const res = await apiFetch(`/api/cart/items/${itemId}/`, { method: 'DELETE' });
        const data = await res.json().catch(() => null);
        if (res.ok) {
          renderCart(data);
        } else {
          btn.disabled = false;
          const feedback = listEl.querySelector(`.cart-item-feedback[data-feedback-for="${itemId}"]`);
          feedback.textContent = extractErrorMessage(data, 'Could not remove this item.');
          feedback.hidden = false;
        }
      } catch (err) {
        btn.disabled = false;
      }
    });

    checkoutForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      checkoutError.hidden = true;

      const dateInputs = deliveryDatesContainer.querySelectorAll('.delivery-date-input');
      const deliveryDates = [];
      for (const input of dateInputs) {
        if (!input.value) {
          checkoutError.textContent = 'Please choose a delivery date for every producer.';
          checkoutError.hidden = false;
          return;
        }
        deliveryDates.push({
          producer_id: Number(input.dataset.producerId),
          delivery_date: input.value,
        });
      }

      checkoutSubmit.disabled = true;
      checkoutSubmit.textContent = 'Placing order…';

      const payload = { delivery_dates: deliveryDates };
      const address = document.getElementById('delivery-address').value.trim();
      if (address) payload.delivery_address = address;
      const instructions = document.getElementById('special-instructions').value.trim();
      if (instructions) payload.special_instructions = instructions;

      try {
        const res = await apiFetch('/api/orders/create/', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => null);

        if (res.ok) {
          statusEl.textContent = 'Order placed — taking you to your orders…';
          listEl.innerHTML = '';
          summaryEl.hidden = true;
          checkoutSection.hidden = true;
          setTimeout(() => { window.location.href = '/market/orders/'; }, 900);
          return;
        }

        checkoutError.textContent = extractErrorMessage(data, 'Could not place your order.');
        checkoutError.hidden = false;
      } catch (err) {
        checkoutError.textContent = 'Network error — please try again.';
        checkoutError.hidden = false;
      } finally {
        checkoutSubmit.disabled = false;
        checkoutSubmit.textContent = 'Place order';
      }
    });

    loadCart();
  });
</script>
{% endblock %}
