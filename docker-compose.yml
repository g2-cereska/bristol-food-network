services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bristol_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-bristol_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bristol_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bristol_user} -d ${POSTGRES_DB:-bristol_marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai_service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    command: uvicorn ai_service.main:app --host 0.0.0.0 --port 8001
    volumes:
      - .:/app
    ports:
      - "8001:8001"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: bash -lc "cd backend && python manage.py migrate && python manage.py seed_demo_data && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env.example
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ai_service:
        condition: service_started

volumes:
  postgres_data: